name: Keep Backend Alive

on:
  schedule:
    # Runs every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        # We use a 3-count retry mechanism across 5 seconds of delay in case
        # of transient network issues, targeting the new /health endpoint.
        # Ensure to set RENDER_API_URL in GitHub Secrets to your Render URL.
        run: |
          curl --retry 3 --retry-delay 5 \
          -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
          ${{ secrets.RENDER_API_URL }}/health
