name: Keep Services Alive

on:
  schedule:
    # ── Ping Backend كل 5 دقائق لمنع Sleep على Render ──
    - cron: "*/5 * * * *"
    # ── Ping Supabase كل يوم الساعة 6 صباحاً لمنع Pause خلال الأسبوع ──
    - cron: "0 6 * * *"
  workflow_dispatch:   # تشغيل يدوي عند الحاجة

jobs:

  # ── وظيفة 1: إيقاظ الـ Backend ──────────────────────────────
  ping-backend:
    name: Ping Backend (Render)
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health endpoint
        run: |
          curl --retry 3 --retry-delay 5 --max-time 30 \
          -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
          -f "${{ secrets.RENDER_API_URL }}/health" \
          && echo "✅ Backend is awake" \
          || echo "⚠️ Backend ping failed (may be waking up)"

  # ── وظيفة 2: إيقاظ Supabase (يعمل مرة يومياً فقط) ──────────
  ping-supabase:
    name: Ping Supabase (Daily Keep-Alive)
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        # يستدعي endpoint بسيط على Supabase لمنعها من الدخول في وضع الإيقاف
        # SUPABASE_URL  → مثال: https://xxxx.supabase.co
        # SUPABASE_ANON_KEY → المفتاح العام (anon/public key)
        run: |
          curl --retry 3 --retry-delay 5 --max-time 30 \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          && echo "✅ Supabase is awake" \
          || echo "⚠️ Supabase ping failed"
